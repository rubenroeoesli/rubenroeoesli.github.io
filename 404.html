<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden – Ruben Röösli</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .notfound {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 20px;
      padding: 40px 20px;
    }
    .notfound-code {
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.05em;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .notfound h1 { font-size: clamp(1.2rem, 3vw, 1.8rem); color: var(--t1); margin: 0; }
    .notfound p  { color: var(--t2); font-size: .95rem; max-width: 360px; }
  </style>
</head>
<body>
  <main class="notfound">
    <div class="notfound-code">404</div>
    <h1>Seite nicht gefunden</h1>
    <p>Diese Seite existiert nicht (mehr). Zurück zur Startseite?</p>
    <a href="/" class="btn btn-primary">Zur Startseite</a>
  </main>
</body>
</html>
